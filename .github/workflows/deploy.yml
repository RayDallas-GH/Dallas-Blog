name: Deploy to WordPress

on:
  push:
    branches:
      - main
    paths:
      - '**/*.md'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p ${{ secrets.SSH_PORT }} ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy changed .md files to WordPress
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_USER: ${{ secrets.SSH_USER }}
        run: |
          # 変更されたファイルを取得（日本語パス対応のため -z オプション使用）
          while IFS= read -r file; do
            [ -z "$file" ] && continue
            [ ! -f "$file" ] && echo "SKIP (deleted): $file" && continue

            # wp_post_id / wp_title をコメントから取得
            WP_ID=$(head -5 "$file" | grep -o 'wp_post_id: [0-9]*' | grep -o '[0-9]*' || true)
            if [ -z "$WP_ID" ]; then
              echo "SKIP (no wp_post_id): $file"
              continue
            fi
            WP_TITLE=$(head -5 "$file" | grep 'wp_title:' | sed 's/.*wp_title: //' | sed 's/ -->//')

            # コメント行（wp_post_id / wp_title）を除いた本文を一時ファイルに書き出し
            grep -v '<!-- wp_post_id:' "$file" | grep -v '<!-- wp_title:' > /tmp/wp_content.txt

            echo "Deploying: $file → WP post $WP_ID"

            # サーバーに一時ファイルを転送してWP-CLI実行
            scp -P "$SSH_PORT" -i ~/.ssh/deploy_key \
                /tmp/wp_content.txt \
                "${SSH_USER}@${SSH_HOST}:~/tmp_wp_content.txt"

            # タイトルあり/なしで更新コマンドを分岐
            if [ -n "$WP_TITLE" ]; then
              ssh -n -p "$SSH_PORT" -i ~/.ssh/deploy_key \
                  "${SSH_USER}@${SSH_HOST}" \
                  "wp --path=/home/${SSH_USER}/ibis-dallas.com/public_html \
                   post update ${WP_ID} \
                   --post_content=\"\$(cat ~/tmp_wp_content.txt)\" \
                   --post_title=\"${WP_TITLE}\" \
                   2>/dev/null \
                   && echo 'OK: post ${WP_ID} updated' \
                   && rm -f ~/tmp_wp_content.txt"
            else
              ssh -n -p "$SSH_PORT" -i ~/.ssh/deploy_key \
                  "${SSH_USER}@${SSH_HOST}" \
                  "wp --path=/home/${SSH_USER}/ibis-dallas.com/public_html \
                   post update ${WP_ID} \
                   --post_content=\"\$(cat ~/tmp_wp_content.txt)\" \
                   2>/dev/null \
                   && echo 'OK: post ${WP_ID} updated (title unchanged)' \
                   && rm -f ~/tmp_wp_content.txt"
            fi
          done < <(git diff -z --name-only HEAD~1 HEAD | tr '\0' '\n' | grep '\.md$')
